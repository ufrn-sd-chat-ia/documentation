global:
  scrape_interval: 5s

# Os microsserviços rodam no host (fora do Docker) até a containerização
# opcional prevista na Fase 1/6. host.docker.internal aponta de volta pro
# host a partir de dentro do container do Prometheus.
#
# /actuator/prometheus só existe a partir da Fase 6 (micrometer-registry-
# prometheus); até lá esses targets aparecem como "down" no Prometheus,
# o que é esperado.
scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8888"]

  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8761"]

  - job_name: ms1-coordenador
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: ms2-ai-powered
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: ms3-serverless
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
